<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RZMenu Guide</title>
    <meta name="description" content="Trilingual RZMenu modding guide, examples, asset dump, and support page.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#/en/get-started" aria-label="RZMenu Guide home">
        <img class="brand-avatar" src="assets/ray_avatar.png" alt="">
        <span>
          <strong>RZMenu Guide</strong>
          <small id="brand-subtitle">Friendly pain manual</small>
        </span>
      </a>

      <nav id="section-tabs" class="section-tabs" aria-label="Site sections"></nav>

      <div class="top-actions">
        <nav class="lang-switch" aria-label="Language switch">
          <a data-lang="en" href="#/en/get-started">ENG</a>
          <a data-lang="ru" href="#/ru/get-started">RU</a>
          <a data-lang="zh" href="#/zh/get-started">中文</a>
        </nav>
        <a class="repo-link" href="https://github.com/rayvy/RZMenu-Guide">GitHub</a>
      </div>
    </header>

    <main class="layout">
      <aside class="side-panel">
        <div class="mascot-card">
          <div class="mascot-image-wrapper">
            <img id="mascot-image" src="assets/ray_chan_pointing_ai_slop.png" alt="">
            <div id="mascot-caption" class="mascot-caption" hidden></div>
          </div>
          <div>
            <span id="side-kicker">Manual mode</span>
            <strong id="side-title">Pick a page</strong>
          </div>
        </div>
        <nav id="page-nav" class="page-nav" aria-label="Pages"></nav>
      </aside>

      <article class="content-panel">
        <section id="page-search" class="page-search" hidden>
          <input id="page-search-input" type="search" autocomplete="off" spellcheck="false">
          <small id="page-search-hint"></small>
        </section>
        <div id="loading" class="loading">Loading...</div>
        <div id="guide-content" class="markdown" hidden></div>
      </article>
    </main>

    <footer class="footer">
      <span id="footer-copy">Made by <strong>Rayvich</strong>, but coded this thing ChatGPT, and yeah funny images also ai slopped by ChatGPT</span>
      <a href="https://github.com/rayvy">github.com/rayvy</a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
