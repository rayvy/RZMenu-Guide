<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RZMenu Guide</title>
    <meta name="description" content="Markdown-based bilingual guide site for RZMenu modding.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#/ru/home" aria-label="RZMenu Guide">
        <span class="brand-mark">RZ</span>
        <span>RZMenu Guide</span>
      </a>

      <div class="top-actions">
        <nav class="lang-switch" aria-label="Language">
          <a data-lang="ru" href="#/ru/home">RU</a>
          <a data-lang="en" href="#/en/home">EN</a>
        </nav>
        <a class="repo-link" href="https://github.com/rayvy/RZMenu-Guide">GitHub</a>
      </div>
    </header>

    <main class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-heading">
          <span id="sidebar-kicker">Guides</span>
          <strong id="sidebar-title">RZMenu</strong>
        </div>
        <nav id="guide-nav" class="guide-nav" aria-label="Guides"></nav>
      </aside>

      <article class="content">
        <div id="loading" class="loading">Loading guide...</div>
        <div id="guide-content" class="markdown" hidden></div>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
